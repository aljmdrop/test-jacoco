name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: build y test
        run: mvn clean verify
      - name: upload jacoco report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  analisis-vulnerabilidad:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Make Maven Wrapper executable
        run: chmod +x mvnw
        continue-on-error: true
      - name: snyk test java
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_OPTS: "-Xmx2g"
          MAVEN_OPTS: "-Xmx2g"
        run: snyk test --severity-threshold=high
      - name: generate snyk JSON Report
        if: always()
        run: |
          echo "Generando reporte "
          snyk test --json > snyk-report.json || echo "fallo "
          ls -lh snyk-report.json || echo "no se genero el reporte"
      - name: upload snyk json report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json

  analisis-sonarcloud:
    runs-on: ubuntu-latest
    needs: analisis-vulnerabilidad
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: run sonar cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=j-camposar_calidad_con_jacoco \
            -Dsonar.organization=j-camposar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${SONAR_TOKEN}